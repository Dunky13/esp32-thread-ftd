name: Light Firmware Build

on:
  pull_request:
    paths:
      - ".github/workflows/light-firmware-build.yml"
      - "esp-matter/**"
      - "tools/**"
      - "docs/**"
      - "README.md"
      - "AGENTS.md"
  push:
    branches:
      - main
    tags:
      - "v*"
    paths:
      - ".github/workflows/light-firmware-build.yml"
      - "esp-matter/**"
      - "tools/**"
      - "docs/**"
      - "README.md"
      - "AGENTS.md"
  workflow_dispatch:

permissions:
  contents: read

jobs:
  build-light-core:
    runs-on: ubuntu-latest
    container:
      image: espressif/idf:v5.4
    timeout-minutes: 90

    env:
      BUILD_DIR: build/light-c6-thread
      ESP_MATTER_PATH: ${{ github.workspace }}/esp-matter

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 1
          submodules: false

      - name: Mark workspace safe for git
        shell: bash
        run: |
          set -euo pipefail
          git config --global --add safe.directory "${GITHUB_WORKSPACE}"
          git config --global --add safe.directory "${GITHUB_WORKSPACE}/esp-matter"

      - name: Resolve esp-matter revision
        id: esp-matter-rev
        shell: bash
        run: |
          set -euo pipefail
          printf 'sha=%s\n' "$(git rev-parse HEAD:esp-matter)" >> "${GITHUB_OUTPUT}"

      - name: Restore submodule cache
        id: restore-submodules
        uses: actions/cache/restore@v4
        with:
          path: |
            esp-matter
            .git/modules/esp-matter
          key: ${{ runner.os }}-esp-matter-submodules-v2-${{ steps.esp-matter-rev.outputs.sha }}

      - name: Sync submodules
        shell: bash
        run: |
          set -euo pipefail
          git submodule sync --recursive
          git submodule update --init --recursive --jobs 4

      - name: Save submodule cache
        if: steps.restore-submodules.outputs.cache-hit != 'true'
        uses: actions/cache/save@v4
        with:
          path: |
            esp-matter
            .git/modules/esp-matter
          key: ${{ steps.restore-submodules.outputs.cache-primary-key }}

      - name: Install Python native build deps
        shell: bash
        run: |
          set -euo pipefail
          apt-get update
          DEBIAN_FRONTEND=noninteractive apt-get install -y --no-install-recommends \
            libffi-dev \
            pkg-config \
            python3-dev
          rm -rf /var/lib/apt/lists/*

      - name: Restore Matter bootstrap cache
        id: restore-matter-bootstrap
        uses: actions/cache/restore@v4
        with:
          path: esp-matter/connectedhomeip/connectedhomeip/.environment
          key: ${{ runner.os }}-matter-bootstrap-v3-${{ steps.esp-matter-rev.outputs.sha }}

      - name: Bootstrap Matter environment
        shell: bash
        run: |
          set -euo pipefail
          cd esp-matter/connectedhomeip/connectedhomeip
          # Upstream bootstrap script dereferences unset optional vars.
          set +u
          source scripts/bootstrap.sh -p all,esp32
          set -u
          if declare -F deactivate >/dev/null; then
            deactivate
          fi

      - name: Save Matter bootstrap cache
        if: steps.restore-matter-bootstrap.outputs.cache-hit != 'true'
        uses: actions/cache/save@v4
        with:
          path: esp-matter/connectedhomeip/connectedhomeip/.environment
          key: ${{ steps.restore-matter-bootstrap.outputs.cache-primary-key }}

      - name: Restore pip cache
        id: restore-pip
        uses: actions/cache/restore@v4
        with:
          path: /root/.cache/pip
          key: ${{ runner.os }}-esp-matter-pip-v2-${{ steps.esp-matter-rev.outputs.sha }}

      - name: Install repo-local Python deps
        shell: bash
        run: |
          set -euo pipefail
          python3 -m pip install -r esp-matter/requirements.txt

      - name: Save pip cache
        if: steps.restore-pip.outputs.cache-hit != 'true'
        uses: actions/cache/save@v4
        with:
          path: /root/.cache/pip
          key: ${{ steps.restore-pip.outputs.cache-primary-key }}

      - name: Restore compiler cache
        id: restore-ccache
        uses: actions/cache/restore@v4
        with:
          path: .ccache
          key: ${{ runner.os }}-light-c6-thread-ccache-v2-${{ steps.esp-matter-rev.outputs.sha }}
          restore-keys: |
            ${{ runner.os }}-light-c6-thread-ccache-v2-

      - name: Configure base light firmware
        shell: bash
        env:
          CCACHE_DIR: ${{ github.workspace }}/.ccache
          IDF_CCACHE_ENABLE: "1"
        run: |
          set -euo pipefail
          . /opt/esp/idf/export.sh
          . ./esp-matter/export.sh
          mkdir -p "${BUILD_DIR}"
          cd esp-matter/examples/light
          idf.py -B "../../../${BUILD_DIR}" set-target esp32c6

      - name: Build base light firmware
        shell: bash
        env:
          CCACHE_DIR: ${{ github.workspace }}/.ccache
          IDF_CCACHE_ENABLE: "1"
        run: |
          set -euo pipefail
          . /opt/esp/idf/export.sh
          . ./esp-matter/export.sh
          cd esp-matter/examples/light
          idf.py -B "../../../${BUILD_DIR}" build

      - name: Prepare provisioning support bundle
        shell: bash
        run: |
          set -euo pipefail
          CHIP_ROOT="esp-matter/connectedhomeip/connectedhomeip"
          BUNDLE_ROOT="provisioning-support/connectedhomeip"
          mkdir -p "${BUNDLE_ROOT}/scripts/tools"
          mkdir -p "${BUNDLE_ROOT}/scripts/setup"
          mkdir -p "${BUNDLE_ROOT}/src/setup_payload"
          mkdir -p "${BUNDLE_ROOT}/credentials/test"
          cp "${CHIP_ROOT}/scripts/tools/generate_esp32_chip_factory_bin.py" "${BUNDLE_ROOT}/scripts/tools/"
          cp -R "${CHIP_ROOT}/scripts/tools/spake2p" "${BUNDLE_ROOT}/scripts/tools/"
          cp "${CHIP_ROOT}/scripts/setup/requirements.setuppayload.txt" "${BUNDLE_ROOT}/scripts/setup/"
          cp -R "${CHIP_ROOT}/src/setup_payload/python" "${BUNDLE_ROOT}/src/setup_payload/"
          cp -R "${CHIP_ROOT}/credentials/test/attestation" "${BUNDLE_ROOT}/credentials/test/"
          cp -R "${CHIP_ROOT}/credentials/test/certification-declaration" "${BUNDLE_ROOT}/credentials/test/"
          if [ -f "${CHIP_ROOT}/out/host/chip-cert" ]; then
            mkdir -p "${BUNDLE_ROOT}/out/host"
            cp "${CHIP_ROOT}/out/host/chip-cert" "${BUNDLE_ROOT}/out/host/"
          fi

      - name: Prepare flashable firmware bundle
        shell: bash
        run: |
          set -euo pipefail
          python3 - <<'PY'
          import json
          import pathlib
          import shutil

          build_dir = pathlib.Path("build/light-c6-thread")
          bundle_dir = pathlib.Path("release-bundle") / build_dir
          bundle_dir.mkdir(parents=True, exist_ok=True)

          flasher_args_path = build_dir / "flasher_args.json"
          with flasher_args_path.open(encoding="utf-8") as flasher_args_file:
              flasher_args = json.load(flasher_args_file)

          shutil.copy2(flasher_args_path, bundle_dir / "flasher_args.json")
          for relative_path in flasher_args["flash_files"].values():
              source = pathlib.PurePosixPath(relative_path)
              if source.is_absolute() or ".." in source.parts:
                  raise SystemExit(f"Unsafe flash file path: {relative_path}")
              source_path = build_dir / pathlib.Path(*source.parts)
              target_path = bundle_dir / pathlib.Path(*source.parts)
              if not source_path.is_file():
                  raise SystemExit(f"Missing flash file: {source_path}")
              target_path.parent.mkdir(parents=True, exist_ok=True)
              shutil.copy2(source_path, target_path)
          PY
          mkdir -p dist/light-core-input
          tar -C release-bundle -cf dist/light-core-input/light-c6-thread-firmware-bundle.tar build/light-c6-thread

      - name: Save compiler cache
        if: always() && steps.restore-ccache.outputs.cache-hit != 'true'
        uses: actions/cache/save@v4
        with:
          path: .ccache
          key: ${{ steps.restore-ccache.outputs.cache-primary-key }}

      - name: Upload flashable firmware bundle
        uses: actions/upload-artifact@v4
        with:
          name: light-c6-thread-firmware-bundle
          path: dist/light-core-input/light-c6-thread-firmware-bundle.tar
          if-no-files-found: error
          compression-level: 0

      - name: Upload provisioning support bundle
        uses: actions/upload-artifact@v4
        with:
          name: light-c6-thread-provisioning-support
          path: provisioning-support
          if-no-files-found: error
          compression-level: 0

  package-light-core:
    runs-on: ubuntu-latest
    needs:
      - build-light-core

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Download flashable firmware bundle
        uses: actions/download-artifact@v4
        with:
          name: light-c6-thread-firmware-bundle
          path: dist/light-core-input

      - name: Download provisioning support bundle
        uses: actions/download-artifact@v4
        with:
          name: light-c6-thread-provisioning-support
          path: provisioning-support

      - name: Package build artifacts
        shell: bash
        run: |
          set -euo pipefail
          mkdir -p dist/light-core
          tar -xf dist/light-core-input/light-c6-thread-firmware-bundle.tar
          tar -czf dist/light-core/light-c6-thread-build.tar.gz build/light-c6-thread provisioning-support
          cp docs/ci-and-releases.md dist/light-core/README-device-specific-build.md

      - name: Upload packaged artifact
        uses: actions/upload-artifact@v4
        with:
          name: light-c6-thread-build
          path: dist/light-core/*
          if-no-files-found: error

  publish-light-core-release:
    runs-on: ubuntu-latest
    needs:
      - package-light-core
    if: startsWith(github.ref, 'refs/tags/v')
    permissions:
      contents: write

    steps:
      - name: Download packaged artifact
        uses: actions/download-artifact@v4
        with:
          name: light-c6-thread-build
          path: dist/light-core

      - name: Publish GitHub release assets
        uses: softprops/action-gh-release@v2
        with:
          files: |
            dist/light-core/light-c6-thread-build.tar.gz
            dist/light-core/README-device-specific-build.md
